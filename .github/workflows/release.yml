name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race ./...

  build:
    name: Build (${{ matrix.platform }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: darwin-arm64
            goos: darwin
            goarch: arm64
          - platform: darwin-amd64
            goos: darwin
            goarch: amd64
          - platform: linux-amd64
            goos: linux
            goarch: amd64
          - platform: windows-amd64
            goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          mkdir -p dist
          go build -ldflags="-s -w" -o "dist/ai-log${EXT}" ./cmd/ai-log
          go build -ldflags="-s -w" -o "dist/ai-log-report${EXT}" ./cmd/ai-log-report

      - name: Create archive (Unix)
        if: matrix.goos != 'windows'
        run: |
          tar -czf "ai-agent-telemetry-${{ matrix.platform }}.tar.gz" \
            -C dist ai-log ai-log-report

      - name: Create archive (Windows)
        if: matrix.goos == 'windows'
        run: |
          cd dist
          zip "../ai-agent-telemetry-${{ matrix.platform }}.zip" \
            ai-log.exe ai-log-report.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ai-agent-telemetry-${{ matrix.platform }}.*
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ai-agent-telemetry-*.tar.gz
            ai-agent-telemetry-*.zip
